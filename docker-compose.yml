services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loan_ml
      POSTGRES_PASSWORD: loan_ml
      POSTGRES_DB: loan_ml
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan_ml"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:7860"
    environment:
      DATABASE_URL: postgresql+psycopg2://loan_ml:loan_ml@postgres:5432/loan_ml
      AUDIT_KEY_FILE: /home/user/app/.fernet_key
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:7860"
    environment:
      BACKEND_URL: http://backend:7860
    depends_on:
      - backend

volumes:
  postgres_data:
